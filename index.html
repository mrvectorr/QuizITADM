<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ITADM Quiz</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Startseite -->
    <div id="startseite">
        <div class="header">
            <h1>ITADM Quiz</h1>
            <p class="subtitle">Teste dein IT-Wissen!</p>
        </div>
        
        <div class="hauptmenu">
            <button class="quiz-kategorie-btn" onclick="loadQuiz('itgrundlagen')">
                <i class="fas fa-laptop-code"></i> IT-Grundlagen
            </button>
            <button class="quiz-kategorie-btn" onclick="loadQuiz('linux')">
            <i class="fas fa-terminal"></i> Linux
            </button>
            <button class="quiz-kategorie-btn" onclick="loadQuiz('netzwerk')">
                <i class="fas fa-network-wired"></i> Netzwerk
            </button>
            <button class="quiz-kategorie-btn" onclick="loadQuiz('datenschutz')">
                <i class="fas fa-shield-alt"></i> Datenschutz
            </button>
            <button class="quiz-kategorie-btn" onclick="loadQuiz('scripting')">
                <i class="fas fa-code"></i> Scripting
            </button>
            <button class="quiz-kategorie-btn" onclick="loadQuiz('system')">
                <i class="fas fa-server"></i> Systeme
            </button>
            <button class="quiz-kategorie-btn" onclick="loadQuiz('alle')">
                <i class="fas fa-star"></i> Random 
            </button>
        </div>
    </div>

    <!-- Quiz-Seite -->
    <div id="quizseite" style="display: none;">
        <div class="quiz-nav">
            <h1 id="quiz-title" class="quiz-title"></h1>
            <button id="restart" class="nav-btn" onclick="restartQuiz()">
                <i class="fas fa-home"></i>
            </button>
        </div>

        <div class="quiz-container">
            <div class="quiz-header">
                <div class="progress-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
                <div id="progress-text" class="progress-text"></div>
                <div id="score" class="score-box"></div>
            </div>

            <div id="quiz" style="display: none;">
                <div class="question-card">
                    <p class="question" id="question"></p>
                    <div class="options-grid" id="options"></div>
                </div>
                
                <button id="next" class="next-btn" onclick="nextQuestion()" disabled>
                    Weiter <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Ergebnis Overlay -->
    <div id="result-overlay" class="overlay" style="display: none;">
        <div class="overlay-content">
            <h2 id="result-title"></h2>
            <p id="result-text"></p>
            <button onclick="restartQuiz()">Neustart</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
